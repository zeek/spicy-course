# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files

- repo: https://github.com/pre-commit/mirrors-prettier
  rev: f12edd9c7be1c20cfa42420fd0e6df71e42b51ea  # frozen: v4.0.0-alpha.8
  hooks:
  - id: prettier
    types: [json]

- repo: https://github.com/igorshubovych/markdownlint-cli
  rev: e72a3ca1632f0b11a07d171449fe447a7ff6795e  # frozen: v0.48.0
  hooks:
  # - id: markdownlint
  - id: markdownlint-fix

- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: 4380fbb73a154b5f5624794c1c78d9719ccc860f  # frozen: v2.16.0
  hooks:
  - id: pretty-format-yaml
    args: [--autofix, --indent, '2']

- repo: https://github.com/crate-ci/typos
  rev: 631208b7aac2daa8b707f55e7331f9112b0e062d  # frozen: v1.44.0
  hooks:
  - id: typos

- repo: https://github.com/streetsidesoftware/cspell-cli
  rev: a42085ade523f591dca134379a595e7859986445  # frozen: v9.7.0
  hooks:
  - id: cspell
    types: [markdown]

- repo: https://github.com/rhysd/actionlint
  rev: 393031adb9afb225ee52ae2ccd7a5af5525e03e8  # frozen: v1.7.11
  hooks:
  - id: actionlint

- repo: https://github.com/pre-commit/mirrors-eslint
  rev: a01e9af1e41f2a616fdd8f217b6859ae333f1da9  # frozen: v10.0.3
  hooks:
  - id: eslint

exclude: src/(css|js)/(mermaid|mdbook).*
